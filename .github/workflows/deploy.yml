name: Deploy — FestManager

# Se déclenche uniquement quand le CI est terminé (succès ou échec)
# → garantit qu'aucun déploiement n'arrive sur du code cassé
on:
  workflow_run:
    workflows: ["CI — FestManager"]
    types: [completed]
    branches: [develop, main]

jobs:

  # ------------------------------------------------------------------
  # Staging : déploiement automatique quand le CI de develop est vert
  # ------------------------------------------------------------------
  deploy-staging:
    name: Deploy → Staging
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout (commit exact ayant passé le CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Installer Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy Backend → Staging
        working-directory: backend
        run: railway up --detach --environment staging --service ${{ vars.RAILWAY_BACKEND_SERVICE }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Frontend → Staging
        working-directory: frontend
        run: railway up --detach --environment staging --service ${{ vars.RAILWAY_FRONTEND_SERVICE }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ------------------------------------------------------------------
  # Production : déploiement sur main avec approbation manuelle
  # L'approbateur est configuré dans GitHub → Settings → Environments → production
  # ------------------------------------------------------------------
  deploy-prod:
    name: Deploy → Production
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout (commit exact ayant passé le CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Installer Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy Backend → Production
        working-directory: backend
        run: railway up --detach --environment production --service ${{ vars.RAILWAY_BACKEND_SERVICE }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Frontend → Production
        working-directory: frontend
        run: railway up --detach --environment production --service ${{ vars.RAILWAY_FRONTEND_SERVICE }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
