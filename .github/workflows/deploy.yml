name: Deploy — FestManager

on:
  workflow_run:
    workflows: ["CI — FestManager"]
    types: [completed]
    branches: [main, develop]

jobs:

  # ------------------------------------------------------------
  # Staging — déploiement automatique sur develop (CI vert)
  # ------------------------------------------------------------
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'

    steps:
      - name: Déclencher déploiement backend staging
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X GET "${{ secrets.COOLIFY_STAGING_BACKEND_WEBHOOK }}")
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTP_STATUS:.*//')
          STATUS=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTP_STATUS://')
          echo "HTTP status : $STATUS"
          echo "Response body : $BODY"
          echo "$STATUS" | grep -q "^2" \
            && echo "Backend staging déclenché" \
            || (echo "Échec webhook backend staging (HTTP $STATUS)" && exit 1)

      - name: Déclencher déploiement frontend staging
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.COOLIFY_STAGING_FRONTEND_WEBHOOK }}")
          echo "HTTP status frontend staging : $STATUS"
          echo "$STATUS" | grep -q "^2" \
            && echo "Frontend staging déclenché" \
            || (echo "Échec webhook frontend staging (HTTP $STATUS)" && exit 1)

  # ------------------------------------------------------------
  # Production — déploiement sur main avec approbation manuelle
  # ------------------------------------------------------------
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Déclencher déploiement backend production
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.COOLIFY_PROD_BACKEND_WEBHOOK }}")
          echo "HTTP status backend production : $STATUS"
          echo "$STATUS" | grep -q "^2" \
            && echo "Backend production déclenché" \
            || (echo "Échec webhook backend production (HTTP $STATUS)" && exit 1)

      - name: Déclencher déploiement frontend production
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.COOLIFY_PROD_FRONTEND_WEBHOOK }}")
          echo "HTTP status frontend production : $STATUS"
          echo "$STATUS" | grep -q "^2" \
            && echo "Frontend production déclenché" \
            || (echo "Échec webhook frontend production (HTTP $STATUS)" && exit 1)
