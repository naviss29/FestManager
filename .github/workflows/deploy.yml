name: Deploy — FestManager

on:
  workflow_run:
    workflows: ["CI — FestManager"]
    types: [completed]
    branches: [main, develop]

jobs:

  # ------------------------------------------------------------
  # Staging — déploiement automatique sur develop (CI vert)
  # ------------------------------------------------------------
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    environment: staging
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'develop'

    steps:
      - name: Déclencher déploiement backend staging
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_STAGING_BACKEND_WEBHOOK }}" \
            -H "Content-Type: application/json" | grep -q "^2" \
            && echo "Backend staging déclenché" \
            || (echo "Échec webhook backend staging" && exit 1)

      - name: Déclencher déploiement frontend staging
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_STAGING_FRONTEND_WEBHOOK }}" \
            -H "Content-Type: application/json" | grep -q "^2" \
            && echo "Frontend staging déclenché" \
            || (echo "Échec webhook frontend staging" && exit 1)

  # ------------------------------------------------------------
  # Production — déploiement sur main avec approbation manuelle
  # ------------------------------------------------------------
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Déclencher déploiement backend production
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_PROD_BACKEND_WEBHOOK }}" \
            -H "Content-Type: application/json" | grep -q "^2" \
            && echo "Backend production déclenché" \
            || (echo "Échec webhook backend production" && exit 1)

      - name: Déclencher déploiement frontend production
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.COOLIFY_PROD_FRONTEND_WEBHOOK }}" \
            -H "Content-Type: application/json" | grep -q "^2" \
            && echo "Frontend production déclenché" \
            || (echo "Échec webhook frontend production" && exit 1)
