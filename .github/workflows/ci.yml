name: CI — FestManager

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:

  # ------------------------------------------------------------
  # Backend — Build + Tests
  # ------------------------------------------------------------
  backend:
    name: Backend (Java 17 / Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Diagnostic Maven wrapper
        working-directory: backend
        run: |
          ls -la mvnw
          chmod +x mvnw
          ./mvnw --version

      - name: Compiler et tester
        working-directory: backend
        run: ./mvnw test -B -e --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          APP_JWT_SECRET: dGVzdC1zZWNyZXQtcG91ci1jaS1mZXN0bWFuYWdlci10ZXN0LWtleS0yMDI2
          APP_JWT_EXPIRATION_MS: 86400000

      - name: Publier les résultats de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/

  # ------------------------------------------------------------
  # Frontend — Build
  # ------------------------------------------------------------
  frontend:
    name: Frontend (Node 20 / Angular)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Installer les dépendances
        working-directory: frontend
        run: npm ci

      - name: Build de production
        working-directory: frontend
        run: npm run build -- --configuration production

      - name: Tests unitaires
        working-directory: frontend
        run: npm run test -- --watch=false
