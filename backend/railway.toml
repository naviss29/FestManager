[deploy]
# Railway attend que /actuator/health réponde HTTP 200 avant d'envoyer du trafic
# 180s pour absorber jusqu'à 4 cycles de démarrage JVM (~75s au total cold start Railway)
healthcheckPath = "/actuator/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
