spring:
  application:
    name: festmanager-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/festmanager
    username: festmanager
    password: festmanager_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    require-ssl: false

  # Email SMTP — valeurs par défaut (surchargées par profil docker/prod)
  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

app:
  uploads:
    dir: ./uploads
  frontend:
    url: http://localhost:4200
  google:
    # Client ID Google OAuth — obtenu sur console.cloud.google.com → APIs & Services → Credentials
    client-id: ${GOOGLE_CLIENT_ID:}
  email:
    expediteur: noreply@festmanager.app
    nom-expediteur: FestManager
  jwt:
    # Valeur Base64 valide pour le dev local — surcharger avec APP_JWT_SECRET en production
    secret: ZmVzdG1hbmFnZXItZGV2LWp3dC1zZWNyZXQta2V5LW1pbmltdW0tMzItYnl0ZXMh
    expiration-ms: 86400000 # 24h

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
