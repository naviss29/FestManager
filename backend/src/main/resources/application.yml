spring:
  application:
    name: festmanager-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/festmanager
    username: festmanager
    password: festmanager_dev
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    require-ssl: false

server:
  port: 8080

# JWT
app:
  jwt:
    secret: changeme-remplacer-par-une-cle-secrete-longue-en-production
    expiration-ms: 86400000 # 24h
