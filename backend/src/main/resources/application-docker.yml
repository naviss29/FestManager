spring:
  main:
    lazy-initialization: true   # réduit le temps de démarrage sur Railway

  data:
    jpa:
      repositories:
        bootstrap-mode: deferred  # init des repositories en arrière-plan APRÈS le démarrage de Tomcat
                                  # évite le pic mémoire Antlr/HQL avant que le port soit bindé

  datasource:
    # Local Docker : défauts postgres/festmanager
    # Railway : surcharger avec SPRING_DATASOURCE_URL / USERNAME / PASSWORD
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/festmanager}
    username: ${SPRING_DATASOURCE_USERNAME:festmanager}
    password: ${SPRING_DATASOURCE_PASSWORD:festmanager_dev}
    hikari:
      maximum-pool-size: 3    # réduit le pool de 10 (défaut) à 3 pour limiter la mémoire
      minimum-idle: 1

  # SMTP — variables d'environnement (Docker ou Railway)
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_TLS:false}

# Railway injecte PORT automatiquement — fallback 8080 pour Docker local
server:
  port: ${PORT:8080}

app:
  # CORS : liste d'origines séparées par des virgules
  # Railway : mettre l'URL du service frontend (ex: https://festmanager.up.railway.app)
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:4200,http://localhost:80,http://localhost}
