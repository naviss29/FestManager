spring:
  datasource:
    url: jdbc:h2:mem:festmanager;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  jwt:
    # Clé de dev — 64 octets encodés base64 (ne pas utiliser en prod)
    secret: ZGV2LXNlY3JldC1mZXN0bWFuYWdlci1rZXktbG9uZ3VlLXBvdXItaG1hYy1zaGEyNTY=
    expiration-ms: 86400000

# Désactivation du job RGPD en développement (base H2 en mémoire)
spring.task.scheduling.pool.size: 0

  # En dev, les emails sont loggués dans la console (pas envoyés)
  mail:
    host: localhost
    port: 1025
