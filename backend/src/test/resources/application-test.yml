spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 1025
    username: ""
    password: ""
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  task:
    scheduling:
      pool:
        size: 0

app:
  jwt:
    secret: dGVzdC1zZWNyZXQtcG91ci1jaS1mZXN0bWFuYWdlci10ZXN0LWtleS0yMDI2
    expiration-ms: 86400000
  email:
    expediteur: noreply@festmanager.app
    nom-expediteur: FestManager
