<div class="admin-container">

  <div class="entete">
    <h1>Gestion des comptes</h1>

    <mat-button-toggle-group [value]="enAttente" (change)="changerFiltreAttente($event.value)">
      <mat-button-toggle [value]="true">En attente</mat-button-toggle>
      <mat-button-toggle [value]="false">Tous les comptes</mat-button-toggle>
    </mat-button-toggle-group>
  </div>

  <mat-card>
    <mat-progress-bar *ngIf="chargement" mode="indeterminate"></mat-progress-bar>

    <p *ngIf="!chargement && utilisateurs.length === 0" class="vide">
      {{ enAttente ? 'Aucun compte en attente de validation.' : 'Aucun compte trouvé.' }}
    </p>

    <mat-table *ngIf="utilisateurs.length > 0" [dataSource]="utilisateurs">

      <ng-container matColumnDef="email">
        <mat-header-cell *matHeaderCellDef>Email</mat-header-cell>
        <mat-cell *matCellDef="let u">{{ u.email }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="role">
        <mat-header-cell *matHeaderCellDef>Rôle</mat-header-cell>
        <mat-cell *matCellDef="let u">
          <mat-chip>{{ u.role }}</mat-chip>
        </mat-cell>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <mat-header-cell *matHeaderCellDef>Inscrit le</mat-header-cell>
        <mat-cell *matCellDef="let u">{{ u.createdAt | date:'dd/MM/yyyy HH:mm' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let u">
          <button *ngIf="!u.actif"
                  mat-icon-button color="primary"
                  matTooltip="Valider le compte"
                  (click)="valider(u)">
            <mat-icon>check_circle</mat-icon>
          </button>
          <mat-chip *ngIf="u.actif" class="chip-actif">Actif</mat-chip>
          <button *ngIf="!u.actif"
                  mat-icon-button color="warn"
                  matTooltip="Rejeter la demande"
                  (click)="rejeter(u)">
            <mat-icon>cancel</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="colonnes"></mat-header-row>
      <mat-row *matRowDef="let row; columns: colonnes;"></mat-row>
    </mat-table>

    <mat-paginator
      *ngIf="total > taille"
      [length]="total"
      [pageSize]="taille"
      [pageSizeOptions]="[10, 20, 50]"
      (page)="paginer($event)">
    </mat-paginator>
  </mat-card>

</div>
