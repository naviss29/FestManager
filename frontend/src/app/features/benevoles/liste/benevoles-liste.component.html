<div class="page-container">
  <div class="page-header">
    <h1>Bénévoles</h1>
    <div class="header-actions" *ngIf="peutCreer">
      <button mat-raised-button color="primary" [matMenuTriggerFor]="menuCreation">
        <mat-icon>add</mat-icon> Nouveau bénévole
      </button>
      <mat-menu #menuCreation="matMenu">
        <button mat-menu-item (click)="ouvrirCreation('MANUEL')">
          <mat-icon>person_add</mat-icon> Création manuelle
        </button>
        <button mat-menu-item (click)="ouvrirCreation('INVITATION')">
          <mat-icon>email</mat-icon> Inviter par email
        </button>
        <button mat-menu-item (click)="ouvrirCreation('INSCRIPTION')">
          <mat-icon>app_registration</mat-icon> Pré-inscrire
        </button>
      </mat-menu>
    </div>
  </div>

  <mat-card class="filtre-card">
    <mat-button-toggle-group [(ngModel)]="filtreStatut" (change)="pageIndex=0; charger()">
      <mat-button-toggle *ngFor="let opt of statutOptions" [value]="opt.valeur">{{ opt.label }}</mat-button-toggle>
    </mat-button-toggle-group>
  </mat-card>

  <mat-card>
    <mat-progress-bar mode="indeterminate" *ngIf="chargement"></mat-progress-bar>
    <table mat-table [dataSource]="benevoles" class="full-width">

      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef>Nom / Prénom</th>
        <td mat-cell *matCellDef="let b">
          <strong>{{ b.nom }} {{ b.prenom }}</strong>
          <div class="sous-texte">{{ b.email }}</div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Téléphone</th>
        <td mat-cell *matCellDef="let b">{{ b.telephone || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="statut">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let b">
          <mat-chip [color]="couleurStatut(b.statutCompte)" selected>{{ b.statutCompte }}</mat-chip>
        </td>
      </ng-container>

      <ng-container matColumnDef="tailleTshirt">
        <th mat-header-cell *matHeaderCellDef>T-shirt</th>
        <td mat-cell *matCellDef="let b">{{ b.tailleTshirt || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let b">
          <button mat-icon-button [matMenuTriggerFor]="menu">
            <mat-icon>more_vert</mat-icon>
          </button>
          <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="ouvrirModification(b)"
              *ngIf="b.statutCompte !== 'ANONYMISE'">
              <mat-icon>edit</mat-icon> Modifier
            </button>
            <button mat-menu-item (click)="valider(b)"
              *ngIf="b.statutCompte === 'INSCRIT'">
              <mat-icon>check_circle</mat-icon> Valider
            </button>
            <button mat-menu-item (click)="exporter(b)" *ngIf="peutExporter">
              <mat-icon>download</mat-icon> Export RGPD
            </button>
            <mat-divider></mat-divider>
            <button mat-menu-item (click)="anonymiser(b)"
              *ngIf="peutSupprimer && b.statutCompte !== 'ANONYMISE'" class="warn">
              <mat-icon>person_off</mat-icon> Anonymiser (RGPD)
            </button>
            <button mat-menu-item (click)="supprimer(b)"
              *ngIf="peutSupprimer" class="danger">
              <mat-icon>delete</mat-icon> Supprimer
            </button>
          </mat-menu>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="colonnes"></tr>
      <tr mat-row *matRowDef="let row; columns: colonnes;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="colonnes.length">Aucun bénévole trouvé.</td>
      </tr>
    </table>
    <mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageSizeOptions]="[10,20,50]"
      (page)="onPage($event)"></mat-paginator>
  </mat-card>
</div>
