<mat-sidenav-container class="sidenav-container">

  <mat-sidenav mode="side" opened class="sidenav">
    <div class="sidenav-header">
      <mat-icon class="logo-icon">celebration</mat-icon>
      <span class="logo-text">FestManager</span>
    </div>

    <mat-nav-list>
      <a mat-list-item *ngFor="let item of navItems"
         [routerLink]="item.route" routerLinkActive="active-link">
        <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
        <span matListItemTitle>{{ item.label }}</span>
      </a>
    </mat-nav-list>

    <div class="sidenav-footer" *ngIf="utilisateur">
      <mat-divider></mat-divider>
      <div class="user-info">
        <mat-icon>account_circle</mat-icon>
        <div class="user-details">
          <span class="user-email">{{ utilisateur.email }}</span>
          <mat-chip class="role-chip">{{ utilisateur.role }}</mat-chip>
        </div>
      </div>
      <button mat-button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon> Déconnexion
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="main-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>

</mat-sidenav-container>
